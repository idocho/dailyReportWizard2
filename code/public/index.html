<!-- [임시 진단] 빈 화면 원인 추적 — uncaught 에러를 화면에 표시. 해결 후 제거 -->
<script>
(function(){
  function show(msg){
    var b=document.body||document.documentElement;
    var d=document.createElement('div');
    d.style.cssText='position:fixed;left:0;right:0;top:0;z-index:99999;background:#7f1d1d;color:#fff;font:12px/1.5 monospace;padding:10px;white-space:pre-wrap;word-break:break-all;max-height:60vh;overflow:auto';
    d.textContent='[JS ERROR] '+msg;
    b.appendChild(d);
  }
  window.addEventListener('error',function(e){
    show((e.message||e.error)+'\n@ '+(e.filename||'')+':'+(e.lineno||'')+':'+(e.colno||''));
  });
  window.addEventListener('unhandledrejection',function(e){
    show('PROMISE: '+(e.reason&&(e.reason.stack||e.reason.message||e.reason)));
  });
})();
</script>
</head>
