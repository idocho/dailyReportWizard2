<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>DailyReportWizard v2.0.0</title>
<style>
:root{
  --bg:#F5F6FA; --panel:#fff; --dark:#1A1D2E;
  --indigo:#4338CA; --indigo-l:#EEF2FF;
  --green:#22C55E; --yellow:#F59E0B; --red:#EF4444; --blue:#3B82F6;
  --gray:#94A3B8; --border:#E2E8F0; --text:#1E293B; --sub:#64748B;
  --sw:200px; --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden}
#wr{display:flex;height:100%}
.sidebar{width:var(--sw);background:var(--dark);color:#fff;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;position:fixed;top:0;bottom:0;left:0;z-index:50}
.main{flex:1;margin-left:var(--sw);overflow-y:auto;min-height:100vh;padding-bottom:24px}
.mhdr,.bnav{display:none}
.d{display:block}.m{display:none}
/* 태블릿 가로 전용 — 모바일 미지원 (소형 화면은 마스킹) */
.sb-me{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer}
.sb-me:hover{background:rgba(255,255,255,.06)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-nav{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.sni{display:flex;align-items:center;gap:8px;padding:8px 13px;font-size:12px;cursor:pointer;color:rgba(255,255,255,.6);transition:background .12s}
.sni:hover{background:rgba(255,255,255,.07);color:#fff}
.sni.on{background:rgba(255,255,255,.13);color:#fff;font-weight:700}
.sb-lbl{padding:10px 13px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase}
.sb-a{padding:7px 13px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.sb-a:hover{background:rgba(255,255,255,.06)}
.sb-a.on{background:rgba(255,255,255,.1);border-left-color:var(--green)}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nb{flex:1;padding:9px 4px 11px;text-align:center;font-size:10px;font-weight:700;color:var(--gray);border:none;background:transparent;cursor:pointer;font-family:inherit}
.nb.on{color:var(--indigo)}
.nb i{font-size:18px;display:block;margin-bottom:2px;font-style:normal}
.card{background:var(--panel);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.card-hdr{padding:9px 14px;background:#F8FAFC;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--sub);display:flex;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block;vertical-align:middle}
.g{background:var(--green)}.y{background:var(--yellow)}.e{background:#CBD5E1}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;font-weight:700}
.b-g{background:#DCFCE7;color:#166534}
.btn{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.bp{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.bp:hover{background:#3730A3}
.br{color:var(--red);border-color:transparent;background:transparent}
.bsm{padding:5px 10px;font-size:11px}
.inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:#F8FAFC}
.inp:focus{outline:none;border-color:var(--indigo)}
.inp.sm{font-size:11px;padding:5px 8px}
.pb{padding:8px 6px;border-radius:6px;border:1px solid var(--border);background:#F1F5F9;color:var(--sub);font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;text-align:center;transition:all .1s;line-height:1.3;word-break:keep-all}
.pb.sel{color:#fff;border-color:transparent}
.pb:active{transform:scale(.97)}
.px{padding:4px 5px;border-radius:5px;border:1px solid var(--border);background:#F1F5F9;color:var(--sub);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;word-break:keep-all;text-align:center;transition:all .1s}
.px.sel{color:#fff;border-color:transparent}
.pf{padding:14px 16px;background:#F8FAFC;border-bottom:1px solid var(--border)}
.fl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px}
.sth{display:grid;grid-template-columns:88px 1fr 120px 130px 160px 110px 150px;background:#F1F5F9;border-bottom:1px solid var(--border);padding:5px 14px;gap:6px}
.sth span{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
.str{display:grid;grid-template-columns:88px 1fr 120px 130px 160px 110px 150px;border-bottom:1px solid var(--border);padding:6px 14px;gap:6px;align-items:center;transition:background .1s;min-height:46px}
.str:last-child{border-bottom:none}
.str:hover{background:#FAFBFF}
.stn{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700}
.pxw{display:flex;flex-wrap:wrap;gap:3px}
.sc{padding:12px 14px;border-bottom:1px solid var(--border)}
.sc:last-child{border-bottom:none}
.sc-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pbg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
@media(min-width:768px) and (max-width:1023px){
  .pbg{grid-template-columns:1fr 1fr 1fr}
  .sc{display:grid;grid-template-columns:80px 1fr;grid-template-rows:auto auto;gap:0 12px;align-items:start}
  .sc-hdr{grid-column:1;grid-row:1;align-self:center;margin-bottom:0}
  .sc .pbg{grid-column:2;grid-row:1}
  .sc .inp{grid-column:2;grid-row:2;margin-top:6px}
}
.sh{font-size:11px;font-weight:700;color:var(--sub);padding:9px 14px;border-bottom:1px solid var(--border);background:#F8FAFC;text-transform:uppercase;letter-spacing:.04em}
.sr{padding:12px 14px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sl{font-size:11px;color:var(--sub);margin-bottom:5px}
.ar{display:grid;grid-template-columns:1fr 1fr 30px;padding:8px 12px;gap:8px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.ar:last-child{border-bottom:none}
.chip{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:2px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.chip:hover{border-color:var(--red);color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.mbox{background:var(--panel);border-radius:var(--r);width:100%;max-width:400px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.mhd{padding:13px 16px;background:var(--dark);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.mbd{padding:16px;max-height:70vh;overflow-y:auto}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
@media(min-width:1024px){.toast{bottom:16px}}
/* ── 소형 화면 마스킹 ── */
#scr-mask{display:none;position:fixed;inset:0;background:#1A1D2E;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:24px}
@media(max-width:1023px){#scr-mask{display:flex}}
/* ── 관찰 태그 버튼 ── */
.tg{padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:#F1F5F9;color:var(--sub);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .1s;line-height:1.4}
.tg:active{transform:scale(.95)}
.tg.sel-c{border-color:transparent;color:#fff}
.tg.sel-m{border-color:transparent;color:#fff}
/* condition 컬러 */
.tg[data-k="great"].sel-c{background:#7C3AED}
.tg[data-k="good"].sel-c{background:#2563EB}
.tg[data-k="normal"].sel-c{background:#64748B}
.tg[data-k="bad"].sel-c{background:#DC2626}
/* understand 컬러 */
.tg[data-k="fast"].sel-c{background:#16A34A}
.tg[data-k="normal_u"].sel-c{background:#D97706}
.tg[data-k="slow"].sel-c{background:#DC2626}
/* 멀티 태그 (engage/caution/understand_sub) */
.tg.sel-m{background:var(--indigo)}
.tg[data-g="caution"].sel-m{background:#B45309}
/* 태그 행 레이아웃 */
.tg-cell{display:flex;flex-wrap:wrap;gap:3px;align-content:center}
.tg-sep{width:1px;background:var(--border);align-self:stretch;margin:4px 0;flex-shrink:0}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--gray);font-size:13px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:sp .8s linear infinite;margin-right:8px;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--gray);line-height:1.9}
.sh2{font-size:10px;font-weight:700;color:var(--sub);background:#F1F5F9;padding:5px 12px 4px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.acc-hdr{display:flex;align-items:center;padding:9px 12px;cursor:pointer;gap:6px;user-select:none;background:var(--panel);transition:background .1s}
.acc-hdr:hover{background:var(--bg)}
.acc-body{display:none;padding:10px 12px 12px;border-top:1px solid var(--border);background:#FAFBFF}
.acc-body.open{display:block}
.drill-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.drill-btn:hover{background:var(--bg)}
.drill-btn:last-child{border-bottom:none}
/* ── 설정 아코디언 ── */
.sa{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--panel)}
.sa-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .1s}
.sa-hdr:hover{background:var(--bg)}
.sa-hdr .sa-ico{font-size:16px;flex-shrink:0}
.sa-hdr .sa-lbl{flex:1;font-size:13px;font-weight:700;color:var(--text)}
.sa-hdr .sa-sub{font-size:11px;color:var(--sub);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sa-hdr .sa-chv{font-size:11px;color:var(--gray);transition:transform .18s;flex-shrink:0}
.sa-hdr.open .sa-chv{transform:rotate(90deg)}
.sa-body{display:none;border-top:1px solid var(--border)}
.sa-body.open{display:block}
/* 관리자 전용 섹션 */
.sa.admin-sec{border-color:#F59E0B}
.sa.admin-sec .sa-hdr{background:#FFFBEB}
.sa.admin-sec .sa-hdr:hover{background:#FEF3C7}
/* 관리자 모드 버튼 */
.adm-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--panel);color:var(--sub);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;transition:all .15s}
.adm-btn:hover{background:var(--bg)}
.adm-btn.on{border-color:#F59E0B;background:#FFFBEB;color:#92400E}
</style>
</head>
<body>
<div id="scr-mask">
  <div style="font-size:48px;margin-bottom:8px">🖥️</div>
  <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:8px">PC / 태블릿 전용</div>
  <div style="font-size:13px;color:#94A3B8;line-height:1.8;max-width:300px">
    DailyReportWizard는 11인치 이상<br>태블릿 가로모드 또는 PC에서<br>사용 가능합니다.<br><br>
    <span style="font-size:11px;color:#64748B">최소 해상도: 1024px 이상</span>
  </div>
</div>
<div id="wr">
  <aside class="sidebar" id="sb"></aside>
  <main class="main" id="mc"></main>
  <div class="toast" id="toast"></div>
</div>
<script>
const BC=['#22C55E','#3B82F6','#F59E0B','#EF4444','#94A3B8','#4338CA','#8B5CF6','#F97316','#14B8A6','#EC4899'];

// ── 관찰 태그 정의 (key=Firebase 저장값, label=표시) ──────────────
const TAGS = {
  condition: [
    {key:'great',  label:'💡 번뜩임'},
    {key:'good',   label:'👍 잘함'},
    {key:'normal', label:'😐 보통'},
    {key:'bad',    label:'😴 힘듦'},
  ],
  understand: [
    {key:'fast',     label:'🟢 빠름'},
    {key:'normal_u', label:'🟡 보통'},
    {key:'slow',     label:'🔴 느림'},
  ],
  understand_sub: [
    {key:'self_solve', label:'💪 혼자해결'},
    {key:'retry',      label:'🔁 오답재풀이'},
    {key:'confused',   label:'😵 개념혼동'},
  ],
  engage: [
    {key:'present',  label:'📣 발표'},
    {key:'question', label:'🙋 질문'},
    {key:'help',     label:'🤝 도움'},
    {key:'preview',  label:'📖 예습'},
  ],
  caution: [
    {key:'sleepy',   label:'💤 졸음'},
    {key:'phone',    label:'📵 폰사용'},
    {key:'chat',     label:'🗣 잡담'},
    {key:'attitude', label:'😤 태도불량'},
  ],
  extra: [
    {key:'self_study',  label:'📚 자율학습'},
    {key:'weekly_test', label:'📝 주간Test'},
    {key:'retest',      label:'🔄 재시험'},
  ],
};

let cfg=null,inputData={},progressData={},obsData={},instructor=null;
let curNav='input',curAI=0,fbUrl='',fbPath='',curSheet='';
let clsDrillSh=null; // 학급 관리 드릴다운 상태 (null=최상위, 'M'/'T'=시트)
let adminOn=false;   // 관리자 모드 세션 상태 (새로고침 시 해제)
let sbFolded={};     // 사이드바 시트 섹션 접힘 상태 {시트명: true/false}
let openSaIds=new Set(['sa-fb']); // 설정 아코디언 열림 상태 — renderMain() 재렌더 후 복원용
// SHA-256("idocho")
const ADMIN_HASH='f3fd1456b2db60728b102561496c156e4c4adf0e537d4c45fa0add381fdd9a1e';

const LS=k=>localStorage.getItem(k);
const SS=(k,v)=>localStorage.setItem(k,v);
function loadLocal(){
  fbUrl=LS('drw_fb_url')||'';fbPath=LS('drw_fb_path')||'';
  try{inputData=JSON.parse(LS('drw_input')||'{}');}catch(e){inputData={};}
  try{progressData=JSON.parse(LS('drw_prog')||'{}');}catch(e){progressData={};}
  try{obsData=JSON.parse(LS('drw_obs')||'{}');}catch(e){obsData={};}
  try{instructor=JSON.parse(LS('drw_instr')||'null');}catch(e){instructor=null;}
  try{cfg=JSON.parse(LS('drw_cfg')||'null');}catch(e){cfg=null;}
}
function saveLocal(){
  SS('drw_fb_url',fbUrl);SS('drw_fb_path',fbPath);
  SS('drw_input',JSON.stringify(inputData));
  SS('drw_prog',JSON.stringify(progressData));
  SS('drw_obs',JSON.stringify(obsData));
  if(instructor)SS('drw_instr',JSON.stringify(instructor));
  if(cfg)SS('drw_cfg',JSON.stringify(cfg));
}

function fbE(n){return `${fbUrl.replace(/\/$/,'')}/${fbPath.replace(/^\/|\/$/g,'')}/${n}.json`;}
async function fbGet(n){const r=await fetch(fbE(n));if(!r.ok)throw n+':'+r.status;return r.json();}
async function fbPut(n,d){const r=await fetch(fbE(n),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw n+':'+r.status;return r.json();}
async function fbPatch(n,d){const r=await fetch(fbE(n),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw n+':'+r.status;return r.json();}

const DAYS=['일','월','화','수','목','금','토'];
function today(){const d=new Date();return `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(m,ms=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),ms);}
function setSync(ok){/* syncBadge 제거됨 (v0.9.4) */}

async function pushInput(key,val){
  inputData[key]=val;saveLocal();
  if(!fbUrl||!fbPath)return;
  // 쓰기 권한 가드: 내 assignments 범위 내 키만 Firebase PATCH
  const p=key.split('|');
  if(p.length===4){
    const [sh,cl,,tb]=p;
    const realTb=tb==='__note__'?null:tb;
    if(!_canWrite(sh,cl,realTb))return;
  }
  try{await fbPatch('input',{[key]:val});setSync(true);}catch(e){setSync(false);}
}
async function pushProgress(pkey,val){
  progressData[pkey]=val;saveLocal();
  if(!fbUrl||!fbPath)return;
  const p=pkey.split('|');
  if(p.length===3){
    const [sh,cl,tb]=p;
    if(!_canWrite(sh,cl,tb))return;
  }
  try{await fbPatch('session/class_data',{[pkey]:val});setSync(true);}catch(e){setSync(false);}
}

// ── 오늘 날짜 키 (YYYY-MM-DD) ────────────────────────────────────
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// ── obs 저장 키: "sheet|cls|name" → obsData[okey][YYYY-MM-DD] ────
function getObs(sheet,cls,name){
  const okey=`${sheet}|${cls}|${name}`;
  if(!obsData[okey])obsData[okey]={};
  if(!obsData[okey][todayKey()])obsData[okey][todayKey()]={};
  return obsData[okey][todayKey()];
}
async function pushObs(sheet,cls,name){
  saveLocal();
  if(!fbUrl||!fbPath)return;
  if(!_canWrite(sheet,cls,null))return;
  const okey=`${sheet}|${cls}|${name}`;
  const dateKey=todayKey();
  const val=obsData[okey]?.[dateKey]||{};
  // Firebase 경로: obs/{sheet}|{cls}|{name}/{YYYY-MM-DD}
  try{await fbPatch(`obs/${encodeURIComponent(okey)}`,{[dateKey]:val});setSync(true);}catch(e){setSync(false);}
}

// ── 태그 토글 핸들러 ─────────────────────────────────────────────
function onTagCondition(el,sheet,cls,name){
  const k=el.dataset.k;
  const obs=getObs(sheet,cls,name);
  obs.condition = obs.condition===k ? null : k;
  // UI 갱신
  el.closest('.tg-cell').querySelectorAll('.tg').forEach(b=>{
    b.classList.toggle('sel-c', b.dataset.k===obs.condition);
  });
  pushObs(sheet,cls,name);
}
function onTagUnderstand(el,sheet,cls,name){
  const k=el.dataset.k;
  const obs=getObs(sheet,cls,name);
  obs.understand = obs.understand===k ? null : k;
  el.closest('.tg-cell').querySelectorAll('.tg[data-g="understand"]').forEach(b=>{
    b.classList.toggle('sel-c', b.dataset.k===obs.understand);
  });
  pushObs(sheet,cls,name);
}
function onTagMulti(el,sheet,cls,name,field){
  const k=el.dataset.k;
  const obs=getObs(sheet,cls,name);
  if(!obs[field])obs[field]=[];
  const idx=obs[field].indexOf(k);
  if(idx>=0)obs[field].splice(idx,1); else obs[field].push(k);
  el.classList.toggle('sel-m', obs[field].includes(k));
  pushObs(sheet,cls,name);
}

/**
 * 쓰기 권한 가드 — instructor.assignments 기반
 * tb=null 이면 sheet|cls 레벨 검사 (특이사항)
 * instructor 미설정 시 항상 false (모든 쓰기 차단)
 */
function _canWrite(sheet,cls,tb){
  if(!instructor)return false;
  const asgns=instructor.assignments||[];
  if(!asgns.length)return true; // assignments 없으면 전체 허용 (show_all)
  return asgns.some(a=>
    a.sheet===sheet && a.cls===cls && (tb===null||a.tb===tb)
  );
}

}
function selA(i){
  const newSh=instructor?.assignments?.[i]?.sheet||curSheet;
  sbFolded[newSh]=false; // 선택 시트 강제 펼침 (다른 시트는 fold 상태 유지)

}
function selSheet(sh){
  sbFolded[sh]=false; // 선택 시트 강제 펼침
  curSheet=sh;

  const idx=asgns.findIndex(a=>a.sheet===sh);

// ── 수행도 버튼 — instructor.presets 우선으로 단일화 ─────────────
function onPB(btn){
  const key=btn.dataset.key,pi=parseInt(btn.dataset.pi);
  const presets=instructor?.presets||cfg?.presets?.['과제수행도']||[];
  const val=presets[pi]||'';
  pushInput(key,{assign:val});
  document.querySelectorAll('.px,.pb').forEach(b=>{
    if(b.dataset.key!==key||b.dataset.pi===undefined)return;
    const bpi=parseInt(b.dataset.pi),s=bpi===pi;
    b.classList.toggle('sel',s);b.style.background=s?BC[bpi%BC.length]:'';b.style.borderColor=s?'transparent':'';b.style.color=s?'#fff':'';
    if(s){
      const d=document.querySelector(`.dot[data-ikey="${key}"]`);
      if(d){const p=key.split('|');if(p.length===4)d.className='dot '+dotClass(p[0],p[1],p[2],p[3]);}
    }
  });
  const a=instructor?.assignments?.[curAI];
  if(a){const sts=cfg?.sheets?.[a.sheet]?.classes?.[a.cls]?.students||[];const done=sts.filter(s=>inputData[`${a.sheet}|${a.cls}|${s.name}|${a.tb}`]?.assign?.trim()).length;const dc=document.getElementById('doneCount');if(dc)dc.textContent=`${done}/${sts.length}명 완료`;}
}
function onNI(el){pushInput(el.dataset.key,{note:el.value});}
function onPI(el){
  const pkey=el.dataset.pkey,field=el.dataset.field;
  const cur={...progressData[pkey]||{}};cur[field]=el.value;pushProgress(pkey,cur);
  // 진도/과제 변경 시 해당 반 학생 도트 일괄 갱신
  _updateDotsForPkey(pkey);
}

// ── 신호등 판정 헬퍼 ─────────────────────────────────────────
// g(초록): 수행도 입력 + 진도/과제 하나 이상 입력
// y(노랑): 수행도 입력 + 진도/과제 미입력
// e(회색): 수행도 미입력
function dotClass(sheet,cls,name,tb){
  const val=(inputData[`${sheet}|${cls}|${name}|${tb}`]?.assign||'').trim();
  if(!val) return 'e';
  const pd=progressData[`${sheet}|${cls}|${tb}`]||{};
  return (pd.progress?.trim()||pd.homework?.trim())?'g':'y';
}
// 진도/과제 입력 시 현재 화면에 보이는 해당 반 학생 도트 업데이트
function _updateDotsForPkey(pkey){
  const parts=pkey.split('|');
  if(parts.length!==3) return;
  const [sh,cl,tb]=parts;
  document.querySelectorAll('.dot[data-ikey]').forEach(d=>{
    const k=d.dataset.ikey.split('|');
    if(k.length===4&&k[0]===sh&&k[1]===cl&&k[3]===tb)
      d.className='dot '+dotClass(sh,cl,k[2],tb);
  });
}

//  학급 관리 — 2단계 드릴다운
// ══════════════════════════════════════════════════════════
function renderClsMgmt(){
  if(clsDrillSh===null)return renderClsMgmtTop();
  return renderClsMgmtSheet(clsDrillSh);
}

function renderClsMgmtTop(){
  if(!cfg)return `<div class="card"><div class="sh">🏫 학급 &amp; 학생 관리</div><div style="padding:10px 12px;font-size:12px;color:var(--gray)">학생 명단을 먼저 불러오세요.</div></div>`;

  // 내 담당 학급 (assignments 기반)
  const myClsSet=new Set((instructor?.assignments||[]).map(a=>`${a.sheet}|${a.cls}`));
  let myRows='';
  for(const[sh,shD]of Object.entries(cfg.sheets||{})){
    for(const[cls,clsD]of Object.entries(shD.classes||{})){
      if(myClsSet.has(`${sh}|${cls}`)){
        const myRole=(instructor?.assignments||[]).find(a=>a.sheet===sh&&a.cls===cls)?.role||'담임';
        myRows+=buildClsAccordion(sh,cls,clsD,myRole);
      }
    }
  }

  // 전체 시트 드릴다운 버튼
  const sheets=Object.keys(cfg.sheets||{});
  const drillBtns=sheets.map(sh=>{
    const cnt=Object.keys(cfg.sheets[sh]?.classes||{}).length;
    return `<div class="drill-btn" onclick="clsDrillSh='${esc(sh)}';openSaIds.add('sa-cls');renderMain()">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--indigo-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📂</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${esc(sh)}반</div><div style="font-size:11px;color:var(--gray)">${cnt}개 학급</div></div>
      <span style="color:var(--gray);font-size:14px;font-weight:300">›</span>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="sh">🏫 학급 &amp; 학생 관리</div>
    <div class="sh2">내 담당 학급</div>
    ${myRows||'<div style="padding:8px 12px;font-size:11px;color:var(--gray)">담당 수업을 추가하면 여기에 표시됩니다.</div>'}
    <div class="sh2">전체 학급 탐색</div>
    ${drillBtns||'<div style="padding:8px 12px;font-size:11px;color:var(--gray)">등록된 시트가 없습니다.</div>'}
  </div>`;
}

function renderClsMgmtSheet(sh){
  if(!cfg)return '';
  const shD=cfg.sheets?.[sh]||{classes:{}};
  const shClasses=Object.entries(shD.classes||{});
  let rows='';
  for(const[cls,clsD]of shClasses){
    const myRole=(instructor?.assignments||[]).find(a=>a.sheet===sh&&a.cls===cls)?.role||null;
    rows+=buildClsAccordion(sh,cls,clsD,myRole);
  }
  return `<div class="card">
    <div class="sh" style="display:flex;align-items:center;gap:8px;padding:7px 10px 7px 14px">
      <button class="btn bsm" onclick="clsDrillSh=null;renderMain()" style="flex-shrink:0;font-size:11px">← 뒤로</button>
      <span style="flex:1">🏫 ${esc(sh)}반 학급 관리</span>
    </div>
    ${rows||'<div style="padding:8px 12px;font-size:11px;color:var(--gray)">학급이 없습니다.</div>'}
    <div style="padding:10px 12px;border-top:1px solid var(--border)">
      <button class="btn bsm" onclick="addCls('${esc(sh)}')">+ ${esc(sh)}반 학급 추가</button>
    </div>
  </div>`;
}

function buildClsAccordion(sh,cls,clsD,myRole){
  const sts=clsD.students||[],tbs=clsD.textbooks||[];
  const isSub=myRole==='부담임';
  const subBadge=isSub?`<span style="font-size:9px;background:#FEF3C7;color:#92400E;border-radius:8px;padding:1px 6px;font-weight:700;flex-shrink:0">부담임</span>`:'';
  // data-sh / data-cls 어트리뷰트로 식별 — 한글 등 특수문자 클래스명의 clsKey 충돌 방지
  const stuChips=sts.map(s=>`<span class="chip" onclick="rmStu('${esc(sh)}','${esc(cls)}','${esc(s.name)}')">${esc(s.name)} <span>×</span></span>`).join('');
  const tbChips=tbs.map(t=>`<span class="chip" onclick="rmTb('${esc(sh)}','${esc(cls)}','${esc(t)}')">${esc(t)} <span>×</span></span>`).join('');
  return `<div style="border-bottom:1px solid var(--border)">
    <div class="acc-hdr" onclick="toggleAcc(this)">
      <span class="acc-arr" style="font-size:10px;color:var(--gray);width:14px;flex-shrink:0">▶</span>
      <span style="font-size:13px;font-weight:700;flex:1">${esc(cls)}</span>
      ${subBadge}
      <span style="font-size:10px;color:var(--gray);margin:0 6px;white-space:nowrap">학생 ${sts.length} · 교재 ${tbs.length}</span>
      <button class="btn br bsm" onclick="rmCls('${esc(sh)}','${esc(cls)}');event.stopPropagation()" style="padding:2px 7px;font-size:11px;flex-shrink:0">✕</button>
    </div>
    <div class="acc-body">
      <div class="sl">학생</div>
      <div class="chips" data-sh="${esc(sh)}" data-cls="${esc(cls)}" data-chip-type="stu">${stuChips}<span class="chip" style="background:var(--indigo-l);border-color:var(--indigo);color:var(--indigo);cursor:pointer" onclick="addStuInline('${esc(sh)}','${esc(cls)}',this)">+ 추가</span></div>
      <div class="sl" style="margin-top:10px">교재</div>
      <div class="chips" data-sh="${esc(sh)}" data-cls="${esc(cls)}" data-chip-type="tb">${tbChips}<span class="chip" style="background:var(--indigo-l);border-color:var(--indigo);color:var(--indigo);cursor:pointer" onclick="addTbInline('${esc(sh)}','${esc(cls)}',this)">+ 교재 추가</span></div>
    </div>
  </div>`;
}

// ── 학생 인라인 추가 (아코디언 열림 상태 유지) ───────────────────
function addStuInline(sh,cls,btnEl){
  const chips=btnEl.parentElement;
  // 이미 입력 중이면 포커스만
  if(chips.querySelector('.stu-new-inp')){chips.querySelector('.stu-new-inp').focus();return;}

  const wrapper=document.createElement('span');
  wrapper.style.cssText='display:inline-flex;align-items:center;border:1px solid var(--indigo);border-radius:12px;padding:2px 6px;background:var(--indigo-l);gap:2px;vertical-align:middle;';
  const inp=document.createElement('input');
  inp.className='stu-new-inp';
  inp.style.cssText='border:none;background:transparent;font-size:11px;width:64px;color:var(--text);font-family:inherit;outline:none;';
  inp.placeholder='이름';
  const ok=document.createElement('span');
  ok.textContent='✓';
  ok.title='추가';
  ok.style.cssText='cursor:pointer;color:var(--indigo);font-weight:700;font-size:13px;line-height:1;padding:0 2px;';
  const cancel=document.createElement('span');
  cancel.textContent='×';
  cancel.style.cssText='cursor:pointer;color:var(--gray);font-size:13px;line-height:1;';
  cancel.onclick=()=>wrapper.remove();

  function doAdd(){
    const n=inp.value.trim();
    if(!n){wrapper.remove();return;}
    ensPath(sh,cls);
    cfg.sheets[sh].classes[cls].students.push({name:n});
    wrapper.remove();
    refreshStuChips(sh,cls);  // chips만 갱신 → 아코디언 열림 유지
    pushCfg();
  }
  ok.onclick=doAdd;
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();doAdd();}
    if(e.key==='Escape')wrapper.remove();
  });
  wrapper.appendChild(inp);wrapper.appendChild(ok);wrapper.appendChild(cancel);
  chips.insertBefore(wrapper,btnEl);
  inp.focus();
}

// chips 영역만 새로 그리기 (전체 재렌더 없음)
function refreshStuChips(sh,cls){
  // data-sh/data-cls 어트리뷰트로 탐색 — clsKey(한글→_) 충돌 방지
  const sSh=sh.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  const sCls=cls.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  const el=document.querySelector(`[data-chip-type="stu"][data-sh="${sSh}"][data-cls="${sCls}"]`);
  if(!el)return;
  const sts=cfg.sheets?.[sh]?.classes?.[cls]?.students||[];
  const stuChips=sts.map(s=>`<span class="chip" onclick="rmStu('${esc(sh)}','${esc(cls)}','${esc(s.name)}')">${esc(s.name)} <span>×</span></span>`).join('');
  el.innerHTML=stuChips+`<span class="chip" style="background:var(--indigo-l);border-color:var(--indigo);color:var(--indigo);cursor:pointer" onclick="addStuInline('${esc(sh)}','${esc(cls)}',this)">+ 추가</span>`;
}

function editPreset(i){
  const txt=document.getElementById(`preset-txt-${i}`);
  const btns=document.getElementById(`preset-btns-${i}`);
  if(!txt||txt.querySelector('input'))return;
  const cur=instructor?.presets?.[i]||'';
  if(btns)btns.style.display='none';
  txt.innerHTML=`<div style="display:flex;gap:4px;width:100%;align-items:center">
    <input id="preset-edit-${i}" class="inp sm" value="${esc(cur)}" style="flex:1;min-width:0"
      onkeydown="if(event.key==='Enter'){event.preventDefault();savePreset(${i});}if(event.key==='Escape')renderMain();">
    <button class="btn bp bsm" style="flex-shrink:0" onclick="savePreset(${i})">✓</button>
    <button class="btn bsm" style="flex-shrink:0" onclick="renderMain()">✕</button>
  </div>`;
  document.getElementById(`preset-edit-${i}`)?.focus();
}
function savePreset(i){
  const val=document.getElementById(`preset-edit-${i}`)?.value.trim()||'';
  if(!val){renderMain();return;}

// 관리자 인증 (SHA-256 비교)
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  const h=await hashPw(pw);

function addTbInline(sh,cls,btnEl){
  const chips=btnEl.parentElement;
  if(chips.querySelector('.tb-new-inp')){chips.querySelector('.tb-new-inp').focus();return;}
  const wrapper=document.createElement('span');
  wrapper.style.cssText='display:inline-flex;align-items:center;border:1px solid var(--indigo);border-radius:12px;padding:2px 6px;background:var(--indigo-l);gap:2px;vertical-align:middle;';
  const inp=document.createElement('input');
  inp.className='tb-new-inp';
  inp.style.cssText='border:none;background:transparent;font-size:11px;width:80px;color:var(--text);font-family:inherit;outline:none;';
  inp.placeholder='교재명';
  const ok=document.createElement('span');
  ok.textContent='✓';
  ok.style.cssText='cursor:pointer;color:var(--indigo);font-weight:700;font-size:13px;line-height:1;padding:0 2px;';
  const cancel=document.createElement('span');
  cancel.textContent='×';
  cancel.style.cssText='cursor:pointer;color:var(--gray);font-size:13px;line-height:1;';
  cancel.onclick=()=>wrapper.remove();
  async function doAdd(){
    const t=inp.value.trim();
    if(!t){wrapper.remove();return;}
    ensPath(sh,cls);
    cfg.sheets[sh].classes[cls].textbooks.push(t);
    wrapper.remove();
    try{refreshTbChips(sh,cls);}catch(e){renderMain();}
    try{await pushCfg();}catch(e){toast('교재 저장 실패: '+e);}
  }
  ok.onclick=doAdd;
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();doAdd();}
    if(e.key==='Escape')wrapper.remove();
  });
  wrapper.appendChild(inp);wrapper.appendChild(ok);wrapper.appendChild(cancel);
  chips.insertBefore(wrapper,btnEl);
  inp.focus();
}
function refreshTbChips(sh,cls){
  // data-sh/data-cls 어트리뷰트로 탐색 — clsKey(한글→_) 충돌 방지
  const sSh=sh.replace(/\\/g,'\\\\').replace(/"/g,'\\"');

  const tbs=cfg.sheets?.[sh]?.classes?.[cls]?.textbooks||[];
  const tbChips=tbs.map(t=>`<span class="chip" onclick="rmTb('${esc(sh)}','${esc(cls)}','${esc(t)}')">${esc(t)} <span>×</span></span>`).join('');
  el.innerHTML=tbChips+`<span class="chip" style="background:var(--indigo-l);border-color:var(--indigo);color:var(--indigo);cursor:pointer" onclick="addTbInline('${esc(sh)}','${esc(cls)}',this)">+ 교재 추가</span>`;
}

// assignments 기반으로 삭제 대상 키 목록 생성
// Returns: { inputKeys: string[], progressKeys: string[] }
function _myResetKeys(){
  const asgns=instructor?.assignments||[];
  const inputKeys=[];
  const progressKeys=[];
  const noteKeySeen=new Set();
  for(const a of asgns){
    const students=cfg?.sheets?.[a.sheet]?.classes?.[a.cls]?.students||[];
    for(const s of students){
      inputKeys.push(`${a.sheet}|${a.cls}|${s.name}|${a.tb}`);
      // __note__ 키는 tb와 무관하게 cls+name 기준으로 1개만 (중복 방지)
      const nk=`${a.sheet}|${a.cls}|${s.name}|__note__`;
      if(!noteKeySeen.has(nk)){noteKeySeen.add(nk);inputKeys.push(nk);}
    }
    progressKeys.push(`${a.sheet}|${a.cls}|${a.tb}`);
  }
  return{inputKeys,progressKeys};
}

async function rmInstr(id,name){
  if(!adminOn){toast('관리자 모드가 필요합니다.');return;}
  if(!confirm(`"${name}" 강사를 삭제합니까?\n이 작업은 되돌릴 수 없습니다.`))return;
  try{await fbPut(`config/instructors/${encodeURIComponent(id)}`,null);toast(`${name} 삭제됨`);loadInstrsSection();}
  catch(e){toast('삭제 실패: '+e);}
}

// ══════════════════════════════════════════════════════════
//  프리셋 추가 / 삭제
// ══════════════════════════════════════════════════════════
function addPreset(){
  const inp=document.getElementById('pInput');if(!inp)return;
  const val=inp.value.trim();if(!val){toast('문구를 입력하세요.');return;}
  if(!instructor){toast('먼저 계정을 설정해 주세요.');return;}
  if(!instructor.presets)instructor.presets=[];
  if(instructor.presets.includes(val)){toast('이미 있는 프리셋입니다.');return;}
  instructor.presets.push(val);inp.value='';saveLocal();
  if(fbUrl&&fbPath&&instructor.id)fbPatch(`config/instructors/${encodeURIComponent(instructor.id)}`,{presets:instructor.presets}).catch(()=>{});
  renderMain();
}
function rmPreset(i){
  if(!instructor?.presets)return;
  if(!confirm(`"${instructor.presets[i]}" 프리셋을 삭제합니까?`))return;
  instructor.presets.splice(i,1);saveLocal();
  if(fbUrl&&fbPath&&instructor.id)fbPatch(`config/instructors/${encodeURIComponent(instructor.id)}`,{presets:instructor.presets}).catch(()=>{});
  renderMain();
}

function closeIM(){document.getElementById('iModal').classList.remove('show');}
function toggleAcc(hdr){
  const body=hdr.nextElementSibling;
  const arrow=hdr.querySelector('.acc-arr');
  const open=body.classList.toggle('open');
  if(arrow)arrow.textContent=open?'▼':'▶';
}

// ══════════════════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════════════════
function init(){
  loadLocal();renderSb();
  if(!instructor){
    renderMhdr('DailyReportWizard');
    document.getElementById('mc').innerHTML=`<div class="empty">👋 안녕하세요!<br>먼저 강사 정보를 등록해 주세요.<br><br><button class="btn bp" onclick="goNav('setting')">⚙️ 설정으로 이동</button></div>`;
    return;
  }
  if(fbUrl&&fbPath){
    Promise.all([fbGet('config').catch(()=>null),fbGet('input').catch(()=>null),fbGet('session').catch(()=>null),fbGet('obs').catch(()=>null)])
    .then(([cfgD,inpD,sessD,obsD])=>{
      if(cfgD){cfg=cfgD;saveLocal();setSync(true);}
      if(inpD)Object.assign(inputData,inpD);
      if(sessD?.class_data)for(const[k,v]of Object.entries(sessD.class_data))if(!progressData[k])progressData[k]=v;
      if(obsD)Object.assign(obsData,obsD);
      if(inpD||sessD||obsD)saveLocal();
      renderMain();renderSb();
    }).catch(()=>{setSync(false);renderMain();});
  }
  renderMain();
}
init();
</script>
