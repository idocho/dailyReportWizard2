<!DOCTYPE html>
<!--
  CampusManager — 관리자 웹 (계정·명단·전송). AUTH_DESIGN·PLATFORM_ARCHITECTURE.
  동일 Firebase 프로젝트, admin/super 로그인. 강사용 DRW와 분리(관리자 도메인).
  선행: 콘솔 Auth 활성화 + js/firebase-config.js.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CampusManager</title>
<link rel="stylesheet" href="css/cm.css?v=1">
</head>
<body>
<div id="setup" class="setup hidden"></div>

<!-- 로그인 게이트 -->
<div id="gate">
  <div class="card">
    <h1>CampusManager</h1><div class="sub">관리자 콘솔 로그인</div>
    <label>캠퍼스</label><select id="g-campus"><option value="dongsuwon">동수원</option></select>
    <label>이름</label><input id="g-name" autocomplete="off">
    <label>비밀번호</label><input id="g-pw" type="password" autocomplete="current-password">
    <button class="btn ink full" id="g-btn" style="margin-top:16px">로그인</button>
    <div class="msg" id="g-msg"></div>
    <div class="sub" style="margin-top:14px">강사 일일 리포트는 강사용 앱(DRW)에서 로그인하세요.</div>
  </div>
</div>

<!-- 앱 셸 -->
<div id="app" class="hidden">
  <div class="topbar">
    <span class="t">CampusManager</span><span class="tag" id="roleTag">관리자</span>
    <span class="who"><b id="whoName"></b> · <span id="whoCampus"></span></span>
    <span class="out" id="logout">로그아웃</span>
  </div>
  <div class="nav">
    <button data-sec="accounts" class="on">강사 계정</button>
    <button data-sec="roster">명단</button>
    <button data-sec="send">일괄 전송</button>
  </div>
  <div class="wrap" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="js/synth_email.js?v=1"></script>
<script type="module" src="js/app.js?v=1"></script>
</body>
</html>
